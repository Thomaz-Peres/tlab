title: Tps homelab
theme: dark
color: slate
background: /images/background.png
backgroundOpacity: 0.83


cardBlur: xl
language: pt

disableCollapse: true
useEqualHeights: true

showStats: true

fullWidth: true

fadeIn: true

favicon: /icons/amp.webp

target: _blank


layout:
