      header: false
      style: row
      columns: 5
  - Monitoramento:
      header: false
      style: row
      columns: 3
  - Note:
      icon: /icons/bars.svg
      header: true
      style: row
      columns: 2
  - Links:
      icon: /icons/link.svg
      header: true
      style: row
      columns: 3
